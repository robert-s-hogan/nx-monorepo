name: dm-toolkit DB backup

# Supabase's free tier has no point-in-time recovery / automatic backups, so
# this is the replacement: a daily pg_dump committed into the repo. Recovery
# granularity is "as of the last daily run", not point-in-time, but it's free
# and needs no plan upgrade.
on:
  schedule:
    - cron: '0 13 * * *' # 13:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install postgresql-client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      # Use the DIRECT connection string (port 5432), not the pooler —
      # pgbouncer's transaction-pooling mode doesn't support the
      # session-level features pg_dump relies on. Find it in the Supabase
      # dashboard under Project Settings -> Database -> Connection string
      # -> URI. Add it as a repo secret named DM_TOOLKIT_SUPABASE_DB_URL
      # (Settings -> Secrets and variables -> Actions) — never paste a raw
      # DB password into a workflow file or chat.
      - name: Dump database
        env:
          DB_URL: ${{ secrets.DM_TOOLKIT_SUPABASE_DB_URL }}
        run: |
          mkdir -p backups/dm-toolkit
          pg_dump "$DB_URL" --no-owner --no-privileges --schema=public \
            | gzip > "backups/dm-toolkit/$(date -u +%Y-%m-%d).sql.gz"

      # Keeps repo growth bounded — 30 days of daily dumps is plenty of
      # recovery window for a hobby project without letting history bloat
      # forever.
      - name: Prune backups older than 30 days
        run: find backups/dm-toolkit -name '*.sql.gz' -mtime +30 -delete

      - name: Commit backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/dm-toolkit
          git diff --cached --quiet || git commit -m "chore: dm-toolkit db backup $(date -u +%Y-%m-%d)"
          git push
